name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v1
        with:
          args: "check data_generator/ dashboard/ dags/ tests/"
  test:
    name: pytest
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install kafka-python pandas numpy scikit-learn loguru pytest python-dotenv
      - name: Run tests
        run: pytest tests/ -v --tb=short
  docker-build:
    name: Docker build ${{ matrix.tag }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        include:
          - dockerfile: docker/data-generator/Dockerfile
            tag: generator
          - dockerfile: docker/dashboard/Dockerfile
            tag: dashboard
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f ${{ matrix.dockerfile }} -t platform/${{ matrix.tag }}:ci .
